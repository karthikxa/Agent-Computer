<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuperAgent — Desktop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─────────────────────────────────────────────────────────────
       Reset & base
    ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --border:    #2a2a2a;
      --text:      #e5e5e5;
      --muted:     #6b6b6b;
      --accent:    #ffffff;
      --danger:    #ff3b30;
      --success:   #30d158;
      --font:      'Inter', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      overflow: hidden;
      font-family: var(--font);
      color: var(--text);
      user-select: none;
    }

    /* ─────────────────────────────────────────────────────────────
       Main layout — desktop fills everything
    ───────────────────────────────────────────────────────────── */
    .shell {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─────────────────────────────────────────────────────────────
       Desktop viewport — the agent's screen
    ───────────────────────────────────────────────────────────── */
    .desktop {
      position: relative;
      flex: 1;
      background: #000;
      overflow: hidden;
      cursor: default;
    }

    /* The live stream image */
    #stream {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;   /* never let the image steal events */
    }

    /* ─────────────────────────────────────────────────────────────
       Agent lock — invisible but blocks all user input
       (no visual decoration — clean like Manus)
    ───────────────────────────────────────────────────────────── */
    #agent-lock {
      position: absolute;
      inset: 0;
      z-index: 10;
      cursor: default;
      /* completely invisible — no borders, no overlays */
    }

    /* when agent owns: block pointer; when user owns: let through */
    #agent-lock.unlocked {
      pointer-events: none;
    }

    /* ─────────────────────────────────────────────────────────────
       TAKE CONTROL pill — appears on hover/touch while agent runs
    ───────────────────────────────────────────────────────────── */
    #take-control {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 0;
      border-radius: 100px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
    }

    #take-control.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: all;
    }

    /* Left part — label */
    .tc-label {
      background: rgba(22,22,22,0.95);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      padding: 11px 18px 11px 20px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.75);
      white-space: nowrap;
      letter-spacing: -0.1px;
    }

    /* Right part — STOP button */
    #btn-stop {
      background: var(--danger);
      border: none;
      padding: 11px 20px 11px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
      font-family: var(--font);
      letter-spacing: -0.1px;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background 0.15s ease;
    }

    #btn-stop:hover { background: #ff1f13; }
    #btn-stop:active { background: #d93025; }

    .stop-sq {
      width: 9px;
      height: 9px;
      background: #fff;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ─────────────────────────────────────────────────────────────
       USER CONTROL bar — shown at bottom after STOP
       (replaces take-control pill)
    ───────────────────────────────────────────────────────────── */
    #user-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: rgba(14,14,14,0.96);
      backdrop-filter: blur(20px) saturate(200%);
      -webkit-backdrop-filter: blur(20px) saturate(200%);
      border-top: 1px solid rgba(255,255,255,0.07);
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 50;
    }

    #user-bar.visible {
      display: flex;
    }

    .ub-left {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .ub-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
    }

    .ub-text {
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      font-weight: 400;
    }

    .ub-text strong {
      color: var(--success);
      font-weight: 500;
    }

    .ub-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #btn-resume {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.75);
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #btn-resume:hover {
      background: rgba(255,255,255,0.13);
      border-color: rgba(255,255,255,0.18);
      color: #fff;
    }

    /* ─────────────────────────────────────────────────────────────
       Click indicator — appears where user clicks in user mode
    ───────────────────────────────────────────────────────────── */
    .click-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(48, 209, 88, 0.7);
      border: 1px solid rgba(48, 209, 88, 0.9);
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0.5);
      animation: dot-appear 0.5s ease forwards;
      z-index: 40;
    }

    @keyframes dot-appear {
      0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
      40%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.6); }
    }

    /* ─────────────────────────────────────────────────────────────
       Slim status bar at very bottom (always visible, minimal)
    ───────────────────────────────────────────────────────────── */
    .statusbar {
      height: 26px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 14px;
      flex-shrink: 0;
    }

    .sb-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10.5px;
      color: var(--muted);
      font-weight: 400;
    }

    .sb-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .sb-dot.on  { background: var(--success); }
    .sb-dot.off { background: var(--danger);  }

    .sb-sep { color: var(--border); }

    .sb-right { margin-left: auto; }

    .sb-agent-id {
      font-size: 10.5px;
      color: var(--muted);
      font-family: 'SF Mono', 'Fira Mono', monospace;
    }

    /* ─────────────────────────────────────────────────────────────
       Config modal (hidden by default, triggered by agent-id click)
    ───────────────────────────────────────────────────────────── */
    #cfg-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #cfg-modal.open { display: flex; }

    .cfg-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      width: 340px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7);
    }

    .cfg-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 18px;
      color: var(--text);
    }

    .cfg-field {
      margin-bottom: 12px;
    }

    .cfg-field label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .cfg-field input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 12.5px;
      font-family: 'SF Mono', monospace;
      outline: none;
      transition: border-color 0.15s;
    }

    .cfg-field input:focus { border-color: rgba(255,255,255,0.25); }

    .cfg-actions {
      display: flex;
      gap: 8px;
      margin-top: 18px;
    }

    .cfg-actions button {
      flex: 1;
      padding: 9px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      border: none;
    }

    .cfg-cancel {
      background: rgba(255,255,255,0.06);
      color: var(--muted);
    }

    .cfg-save {
      background: rgba(255,255,255,0.12);
      color: var(--text);
    }

    .cfg-save:hover { background: rgba(255,255,255,0.18); }

    /* ─────────────────────────────────────────────────────────────
       Connecting state
    ───────────────────────────────────────────────────────────── */
    #connecting {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #000;
      z-index: 5;
    }

    #connecting.hidden { display: none; }

    .conn-ring {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(255,255,255,0.08);
      border-top-color: rgba(255,255,255,0.4);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .conn-text {
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="shell">

  <!-- ── Desktop viewport ── -->
  <div class="desktop" id="desktop">

    <!-- Connecting indicator -->
    <div id="connecting">
      <div class="conn-ring"></div>
      <div class="conn-text">Connecting to desktop…</div>
    </div>

    <!-- Live stream -->
    <img id="stream" src="" alt="" draggable="false" />

    <!-- Invisible agent lock layer -->
    <div id="agent-lock"></div>

    <!-- Take-control pill (appears on hover/touch while agent runs) -->
    <div id="take-control">
      <div class="tc-label">Agent is controlling the desktop</div>
      <button id="btn-stop">
        <div class="stop-sq"></div>
        Stop &amp; Take Control
      </button>
    </div>

    <!-- User control bar (shown after stop) -->
    <div id="user-bar">
      <div class="ub-left">
        <div class="ub-dot"></div>
        <span class="ub-text"><strong>You're in control</strong> — click anywhere on the desktop</span>
      </div>
      <div class="ub-right">
        <button id="btn-resume">
          ▶&nbsp; Hand back to agent
        </button>
      </div>
    </div>

  </div><!-- /desktop -->

  <!-- ── Status bar ── -->
  <div class="statusbar">
    <div class="sb-item">
      <div class="sb-dot on" id="dot-stream"></div>
      <span>Stream</span>
    </div>
    <span class="sb-sep">·</span>
    <div class="sb-item">
      <div class="sb-dot" id="dot-api"></div>
      <span>API</span>
    </div>
    <span class="sb-sep">·</span>
    <div class="sb-item">
      <span id="sb-fps">-- fps</span>
    </div>
    <span class="sb-sep">·</span>
    <div class="sb-item">
      <span id="sb-step">step 0</span>
    </div>
    <div class="sb-right">
      <span class="sb-agent-id" id="sb-agent" style="cursor:pointer;text-decoration:underline dotted rgba(255,255,255,0.2)" title="Click to configure">⬡ agent-001</span>
    </div>
  </div>

</div>

<!-- ── Config modal ── -->
<div id="cfg-modal">
  <div class="cfg-box">
    <div class="cfg-title">Connection Settings</div>
    <div class="cfg-field">
      <label>Agent ID</label>
      <input id="c-agent" type="text" value="agent-001" />
    </div>
    <div class="cfg-field">
      <label>HITL API  (host:port)</label>
      <input id="c-hitl" type="text" value="127.0.0.1:9000" />
    </div>
    <div class="cfg-field">
      <label>Stream  (host:port)</label>
      <input id="c-stream" type="text" value="127.0.0.1:7081" />
    </div>
    <div class="cfg-field">
      <label>Desktop API  (host:port)</label>
      <input id="c-desktop" type="text" value="127.0.0.1:8000" />
    </div>
    <div class="cfg-actions">
      <button class="cfg-cancel" id="cfg-cancel">Cancel</button>
      <button class="cfg-save"   id="cfg-save">Apply</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════
   SuperAgent DOM Vision — Manus-style clean control engine
════════════════════════════════════════════════════════════ */

// ── Config ────────────────────────────────────────────────
let C = {
  agent:   'agent-001',
  hitl:    '127.0.0.1:9000',
  stream:  '127.0.0.1:7081',
  desktop: '127.0.0.1:8000',
};

// Read URL params
(function() {
  const p = new URLSearchParams(location.search);
  if (p.get('agent'))   C.agent   = p.get('agent');
  if (p.get('hitl'))    C.hitl    = p.get('hitl');
  if (p.get('stream'))  C.stream  = p.get('stream');
  if (p.get('desktop')) C.desktop = p.get('desktop');
  syncConfigUI();
})();

function syncConfigUI() {
  document.getElementById('c-agent').value   = C.agent;
  document.getElementById('c-hitl').value    = C.hitl;
  document.getElementById('c-stream').value  = C.stream;
  document.getElementById('c-desktop').value = C.desktop;
  document.getElementById('sb-agent').textContent = '⬡ ' + C.agent;
}

// ── State ─────────────────────────────────────────────────
let agentOwns   = true;    // true = agent controls desktop
let hoverTimer  = null;    // timer to auto-hide take-control pill
let pollTimer   = null;
let streamTimer = null;
let frames      = 0;
let stepCount   = 0;
let fpsCounter  = 0;
let fpsTimer    = null;

// ── Elements ──────────────────────────────────────────────
const $desktop    = document.getElementById('desktop');
const $stream     = document.getElementById('stream');
const $lock       = document.getElementById('agent-lock');
const $pill       = document.getElementById('take-control');
const $userBar    = document.getElementById('user-bar');
const $connecting = document.getElementById('connecting');
const $btnStop    = document.getElementById('btn-stop');
const $btnResume  = document.getElementById('btn-resume');
const $dotStream  = document.getElementById('dot-stream');
const $dotApi     = document.getElementById('dot-api');
const $sbFps      = document.getElementById('sb-fps');
const $sbStep     = document.getElementById('sb-step');
const $sbAgent    = document.getElementById('sb-agent');
const $cfgModal   = document.getElementById('cfg-modal');

// ── Control state setters ─────────────────────────────────

function giveAgentControl() {
  agentOwns = true;

  // Lock layer back on — agent owns input
  $lock.classList.remove('unlocked');
  $lock.style.cursor = 'default';

  // Hide user bar, hide pill
  $userBar.classList.remove('visible');
  $pill.classList.remove('visible');

  // Desktop cursor
  $desktop.style.cursor = 'default';
}

function giveUserControl() {
  agentOwns = false;

  // Release lock layer — user owns input
  $lock.classList.add('unlocked');

  // Show user bar
  $userBar.classList.add('visible');
  $pill.classList.remove('visible');

  // Desktop cursor becomes pointer so user knows they can click
  $desktop.style.cursor = 'crosshair';
}

// ── Show / hide the "Stop & Take Control" pill ────────────
// Appears when user moves mouse or touches screen while agent runs

function showPill() {
  if (!agentOwns) return;     // user already in control
  $pill.classList.add('visible');
  clearTimeout(hoverTimer);
  // Auto-hide after 2.5s of no movement
  hoverTimer = setTimeout(hidePill, 2500);
}

function hidePill() {
  $pill.classList.remove('visible');
}

// Mouse enters the desktop area → show pill
$desktop.addEventListener('mousemove', () => {
  if (!agentOwns) return;
  showPill();
  clearTimeout(hoverTimer);
  hoverTimer = setTimeout(hidePill, 2500);
});

// Touch — mobile / tablet
$desktop.addEventListener('touchstart', (e) => {
  if (!agentOwns) return;
  e.preventDefault();          // prevent ghost click
  showPill();
}, { passive: false });

// Mouse leaves viewport → hide pill
$desktop.addEventListener('mouseleave', hidePill);

// ── STOP — user wants to take over ───────────────────────

$btnStop.addEventListener('click', async () => {
  $btnStop.style.opacity = '0.5';
  $btnStop.style.pointerEvents = 'none';

  await hitl('/stop', 'POST');   // ask agent to pause
  giveUserControl();

  $btnStop.style.opacity = '';
  $btnStop.style.pointerEvents = '';
});

// ── RESUME — hand back to agent ───────────────────────────

$btnResume.addEventListener('click', async () => {
  $btnResume.style.opacity = '0.5';
  $btnResume.style.pointerEvents = 'none';

  await hitl('/resume', 'POST');
  giveAgentControl();

  $btnResume.style.opacity = '';
  $btnResume.style.pointerEvents = '';
});

// ── Click forwarding (user mode) ──────────────────────────
// When user clicks the desktop in user mode, forward to Desktop API

$desktop.addEventListener('click', async (e) => {
  if (agentOwns) return;   // agent owns — ignore (lock should have blocked anyway)
  if (e.target === $btnResume || $btnResume.contains(e.target)) return;

  // Drop a small dot where user clicked
  spawnClickDot(e.offsetX, e.offsetY);

  // Map from display coords → stream native resolution
  const rect = $stream.getBoundingClientRect();
  const sx = ($stream.naturalWidth  || 1920) / Math.max(rect.width,  1);
  const sy = ($stream.naturalHeight || 1080) / Math.max(rect.height, 1);
  const nx = Math.round((e.clientX - rect.left)  * sx);
  const ny = Math.round((e.clientY - rect.top)   * sy);

  try {
    await fetch(`http://${C.desktop}/click`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ x: nx, y: ny, button: 'left' }),
    });
    $dotApi.className = 'sb-dot on';
  } catch {
    $dotApi.className = 'sb-dot off';
  }
});

// Double-click forwarding
$desktop.addEventListener('dblclick', async (e) => {
  if (agentOwns) return;
  const rect = $stream.getBoundingClientRect();
  const sx = ($stream.naturalWidth  || 1920) / Math.max(rect.width,  1);
  const sy = ($stream.naturalHeight || 1080) / Math.max(rect.height, 1);
  const nx = Math.round((e.clientX - rect.left)  * sx);
  const ny = Math.round((e.clientY - rect.top)   * sy);
  try {
    await fetch(`http://${C.desktop}/double_click`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ x: nx, y: ny }),
    });
  } catch {}
});

// Keyboard forwarding (user mode)
document.addEventListener('keydown', async (e) => {
  if (agentOwns) return;
  if (e.target.tagName === 'INPUT') return;
  // Ctrl+Shift+R = hand back to agent shortcut
  if (e.ctrlKey && e.shiftKey && e.key === 'R') { $btnResume.click(); return; }
  try {
    await fetch(`http://${C.desktop}/key`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: e.key }),
    });
  } catch {}
});

// ── Click dot indicator ───────────────────────────────────

function spawnClickDot(x, y) {
  const dot = document.createElement('div');
  dot.className = 'click-dot';
  dot.style.left = x + 'px';
  dot.style.top  = y + 'px';
  $desktop.appendChild(dot);
  dot.addEventListener('animationend', () => dot.remove());
}

// ── HITL API ──────────────────────────────────────────────

async function hitl(path, method = 'GET', body = null) {
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`http://${C.hitl}${path}`, opts);
    $dotApi.className = 'sb-dot on';
    return res.ok ? await res.json().catch(() => ({})) : {};
  } catch {
    $dotApi.className = 'sb-dot off';
    return {};
  }
}

// Poll status every 3 s — sync paused state from server
async function pollStatus() {
  const d = await hitl('/status', 'GET');
  if (typeof d.paused === 'boolean') {
    if (d.paused && agentOwns)  giveUserControl();
    if (!d.paused && !agentOwns) giveAgentControl();
  }
  if (typeof d.step_count === 'number') {
    stepCount = d.step_count;
    $sbStep.textContent = 'step ' + stepCount;
  }
}

// ── Stream ────────────────────────────────────────────────

function startStream() {
  // Try MJPEG multipart from stream server
  const url = `http://${C.stream}/stream?t=${Date.now()}`;

  $stream.onerror = () => {
    // Fallback: poll screenshots from Desktop API
    $dotStream.className = 'sb-dot off';
    startPollFallback();
  };

  $stream.onload = () => {
    $connecting.classList.add('hidden');
    $dotStream.className = 'sb-dot on';
    fpsCounter++;
  };

  // For MJPEG streams, each boundary frame fires a "load" event
  $stream.src = url;

  // FPS counter
  fpsTimer = setInterval(() => {
    $sbFps.textContent = fpsCounter + ' fps';
    fpsCounter = 0;
  }, 1000);
}

function startPollFallback() {
  if (streamTimer) clearInterval(streamTimer);
  streamTimer = setInterval(async () => {
    try {
      const res = await fetch(`http://${C.desktop}/screenshot?t=${Date.now()}`);
      if (!res.ok) return;
      const blob = await res.blob();
      const old  = $stream.src;
      $stream.src = URL.createObjectURL(blob);
      if (old && old.startsWith('blob:')) URL.revokeObjectURL(old);
      frames++;
      fpsCounter++;
      $connecting.classList.add('hidden');
      $dotStream.className = 'sb-dot on';
    } catch {
      $dotStream.className = 'sb-dot off';
    }
  }, 1000 / 30);
}

// ── Config modal ──────────────────────────────────────────

$sbAgent.addEventListener('click', () => $cfgModal.classList.add('open'));

document.getElementById('cfg-cancel').addEventListener('click', () =>
  $cfgModal.classList.remove('open'));

document.getElementById('cfg-save').addEventListener('click', () => {
  C.agent   = document.getElementById('c-agent').value.trim()   || C.agent;
  C.hitl    = document.getElementById('c-hitl').value.trim()    || C.hitl;
  C.stream  = document.getElementById('c-stream').value.trim()  || C.stream;
  C.desktop = document.getElementById('c-desktop').value.trim() || C.desktop;
  $cfgModal.classList.remove('open');
  syncConfigUI();
  restart();
});

// Close on backdrop click
$cfgModal.addEventListener('click', (e) => {
  if (e.target === $cfgModal) $cfgModal.classList.remove('open');
});

// ── Prevent right-click on stream ─────────────────────────
$desktop.addEventListener('contextmenu', e => e.preventDefault());

// ── Boot ──────────────────────────────────────────────────

function restart() {
  if (streamTimer) { clearInterval(streamTimer); streamTimer = null; }
  if (pollTimer)   { clearInterval(pollTimer);   pollTimer   = null; }
  if (fpsTimer)    { clearInterval(fpsTimer);    fpsTimer    = null; }
  $stream.src = '';
  $connecting.classList.remove('hidden');
  giveAgentControl();
  startStream();
  pollTimer = setInterval(pollStatus, 3000);
  pollStatus();
}

window.addEventListener('load', restart);
</script>
</body>
</html>
